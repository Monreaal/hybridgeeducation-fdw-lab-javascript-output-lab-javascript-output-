<!-- Modifica el archivo ejercicio2.html. Crea una página HTML que contenga lo siguiente:

- Un título que diga "Demostración de Output en Javascript".
- Un botón que, al hacer clic, muestre una alerta con tu nombre.
- Un párrafo vacío y un botón que, al hacer clic, cambie el contenido del párrafo a "¡Texto actualizado con Javascript!".
Un mensaje que se imprima en la consola del navegador cuando se cargue la página. --> 

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios JS</title>
</head>
<body>
  <h1>Demostración de Output en Javascript</h1>
  <button onclick="alerta()">Cambia el contenido</button>

  <p id="texto"></p>
  <button onclick="llenarp()">Cambia el contenido</button>


  <script>
  window.addEventListener("load", () => {
    console.log("La página se cargó completamente");
  });
    function alerta() {
      alert("HOOLA USUARIO")
          }
    function llenarp(){
     document.getElementById("texto").innerHTML = "¡Texto actualizado con Javascript!"
    }
  </script>

</body>
</html>
